<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/layz_logz_app_icon_8k.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LayZ LogZ is your personal health memory platform. Snap it. Say it. LogZ it."
    />
    <title>LayZ LogZ | Your Personal Health Memory</title>
  </head>
  <body>
    <form
      name="layzlogz-waitlist"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="layzlogz-waitlist" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="role">
        <option>Individual</option>
        <option>Caregiver</option>
        <option>Healthcare Professional</option>
        <option>Investor</option>
        <option>Other</option>
      </select>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
